<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transforma-Ações — Gestão do Projeto</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;background:#F4F6FE;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#F3F4F6}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:10px}
button{cursor:pointer;font-family:inherit}
button:hover{opacity:.88}
input,select,textarea{font-family:inherit}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1E3A8A,#7C3AED,#DB2777);display:flex;align-items:center;justify-content:center;z-index:9999}
#loginBox{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 25px 60px rgba(0,0,0,.25)}
#loginBox h1{font-family:'Sora',sans-serif;font-size:1.5rem;color:#111827;margin-bottom:.25rem}
#loginBox p{color:#6B7280;font-size:.85rem;margin-bottom:1.75rem;line-height:1.5}
#loginBox input{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:.75rem 1rem;font-size:.95rem;outline:none;margin-bottom:.75rem;transition:border .2s}
#loginBox input:focus{border-color:#7C3AED}
#loginBtn{width:100%;background:linear-gradient(135deg,#1E3A8A,#7C3AED);color:#fff;border:none;border-radius:10px;padding:.85rem;font-size:.95rem;font-weight:700;margin-bottom:.6rem}
#loginErr{color:#DC2626;font-size:.8rem;text-align:center;min-height:1.2rem}

/* LAYOUT */
#app{display:none}
header{background:linear-gradient(135deg,#1E3A8A 0%,#7C3AED 55%,#DB2777 100%);padding:1.5rem 2rem;color:#fff}
.header-inner{max-width:1200px;margin:0 auto}
.logos{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1.2rem}
.logo-divider{width:1px;height:36px;background:rgba(255,255,255,.3)}
.logo-badge{font-size:.78rem;font-weight:800;letter-spacing:.04em;padding:.3rem .7rem;border-radius:8px;background:rgba(255,255,255,.2);color:#fff}
.header-meta{text-align:right}
.header-meta span{display:block;font-size:.72rem;opacity:.7;letter-spacing:.04em}
h1.title{font-family:'Sora',sans-serif;font-size:clamp(1.3rem,3vw,1.9rem);font-weight:800;letter-spacing:-.02em;line-height:1.2}
.title-sub{margin:.35rem 0 0;opacity:.85;font-size:.88rem}
.stat-cards{display:flex;gap:1.25rem;margin-top:1.25rem;flex-wrap:wrap}
.stat-card{background:rgba(255,255,255,.12);border-radius:12px;padding:.75rem 1.1rem;backdrop-filter:blur(8px);min-width:130px}
.stat-card .slabel{font-size:.7rem;opacity:.75;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
.stat-card .sval{font-size:1.25rem;font-weight:800;font-family:'Sora',sans-serif}
.stat-card .ssub{font-size:.7rem;opacity:.7;margin-top:.1rem}

nav{background:#fff;border-bottom:1px solid #E5E7EB;position:sticky;top:0;z-index:50;overflow-x:auto}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;white-space:nowrap}
.tab-btn{background:none;border:none;padding:.9rem 1.1rem;font-size:.85rem;font-weight:500;color:#6B7280;border-bottom:2.5px solid transparent;transition:all .15s;font-family:inherit}
.tab-btn.active{font-weight:700;color:#7C3AED;border-bottom-color:#7C3AED}

main{max-width:1200px;margin:0 auto;padding:2rem}

/* CARDS */
.card{background:#fff;border-radius:14px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04)}
.card-flush{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);overflow:hidden}

/* GRID */
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:1.25rem}
.grid-team{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}

/* BADGES */
.badge{border-radius:100px;padding:.2rem .65rem;font-size:.68rem;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:.25rem}

/* BUTTONS */
.btn-primary{color:#fff;border:none;border-radius:8px;padding:.5rem 1rem;font-size:.82rem;font-weight:700;display:inline-flex;align-items:center;gap:.35rem}
.btn-sm{background:none;border:1px solid #E5E7EB;border-radius:7px;padding:.28rem .55rem;color:#6B7280;display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem}
.btn-danger{background:none;border:1px solid #FCA5A5;border-radius:7px;padding:.28rem .55rem;color:#DC2626;display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem}
.btn-filter{background:none;border:1px solid #E5E7EB;border-radius:7px;padding:.4rem .8rem;font-size:.78rem;color:#6B7280;font-weight:500}
.btn-filter.active{background:#F5F3FF;border-color:#7C3AED;color:#7C3AED;font-weight:700}
.btn-filter-blue.active{background:#EFF6FF;border-color:#2563EB;color:#2563EB;font-weight:700}

/* PROGRESS BAR */
.prog-wrap{height:6px;background:#F3F4F6;border-radius:10px}
.prog-bar{height:100%;border-radius:10px;transition:width .3s}
.prog-wrap-sm{height:5px;background:#F3F4F6;border-radius:10px}
.prog-wrap-xs{height:4px;background:#F3F4F6;border-radius:10px}

/* CHECKBOX */
.cb{width:18px;height:18px;border-radius:5px;border:2px solid #D1D5DB;background:#fff;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}

/* OBJ ROWS */
.obj-row{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem .75rem;background:#FAFAFA;border-radius:10px;border:1px solid #F3F4F6;margin-bottom:.5rem}
.obj-row.done{background:#F0FDF4;border-color:#BBF7D0}
.obj-text{flex:1;min-width:0;font-size:.83rem;color:#111827;line-height:1.5}
.obj-text.done{color:#6B7280;text-decoration:line-through}
.obj-meta{font-size:.72rem;color:#9CA3AF;margin-top:.2rem;display:block}

/* GANTT */
.gantt-wrap{display:flex}
.gantt-labels{width:230px;flex-shrink:0}
.gantt-labels .gl-header{height:36px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;padding-left:8px}
.gantt-labels .gl-row{height:48px;border-bottom:1px solid #F9FAFB;display:flex;align-items:center;padding:0 8px;gap:.4rem}
.gantt-timeline{flex:1;overflow-x:auto}
.gantt-inner{min-width:560px;position:relative}
.year-header{height:36px;position:relative;border-bottom:1px solid #E5E7EB;background:#F9FAFB}
.year-tick{position:absolute;height:100%;border-left:1px solid #E5E7EB;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#374151}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#EF4444;z-index:10}
.today-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#EF4444;color:#fff;font-size:.6rem;font-weight:700;border-radius:4px;padding:1px 4px;white-space:nowrap}
.gantt-row{height:48px;border-bottom:1px solid #F9FAFB;position:relative}
.gantt-bar{position:absolute;height:28px;top:10px;border-radius:7px;z-index:6;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;gap:3px}
.gantt-bar-btn{background:rgba(255,255,255,.25);border:none;border-radius:4px;padding:2px 4px;color:#fff;display:flex;align-items:center}
.gantt-legend{padding:.75rem .5rem;display:flex;gap:1rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:.4rem;font-size:.73rem;color:#6B7280}
.legend-dot{width:12px;height:12px;border-radius:3px}

/* BUDGET */
.budget-row{padding:.85rem 1rem;border-bottom:1px solid #F3F4F6}
.budget-figures{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.budget-fig label{font-size:.68rem;color:#9CA3AF;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:block}
.budget-fig .val{font-size:.88rem;font-weight:700}

/* TEAM CARDS */
.team-card{background:#fff;border-radius:14px;padding:1.1rem;box-shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);border-top:3px solid #ccc;display:flex;flex-direction:column;gap:.75rem}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.88rem;font-weight:700;flex-shrink:0}
.team-meta{font-size:.73rem;color:#9CA3AF;display:flex;gap:1rem;flex-wrap:wrap}

/* DOC ROWS */
.doc-row{padding:1rem;border-bottom:1px solid #F3F4F6;display:flex;align-items:flex-start;gap:.75rem}
.doc-icon{width:40px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* MODAL */
#modalOverlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;align-items:center;justify-content:center;padding:1rem}
#modalOverlay.open{display:flex}
#modalBox{background:#fff;border-radius:18px;padding:2rem;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.modal-header h3{font-size:1.05rem;font-weight:700;color:#111827}
.modal-close{background:#F3F4F6;border:none;border-radius:8px;padding:.4rem;color:#374151;display:flex}
.modal-footer{margin-top:1.5rem;display:flex;justify-content:flex-end;gap:.6rem}
.field-group{margin-bottom:1rem}
.field-group label{display:block;margin-bottom:.3rem;font-size:.78rem;font-weight:600;color:#374151}
.field-group input,.field-group select,.field-group textarea{width:100%;border-radius:8px;border:1.5px solid #E5E7EB;padding:.55rem .8rem;font-size:.875rem;font-family:inherit;outline:none;box-sizing:border-box}
.field-group textarea{resize:vertical}
.grid-2cols{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.cb-label{display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.85rem;color:#374151}
.cb-label input{width:16px;height:16px}

/* SECTION */
.section-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.section-head-left{}
.section-title{font-weight:700;font-size:.95rem;color:#111827;display:flex;align-items:center;gap:.6rem;margin-bottom:.3rem}
.page-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem}
.page-title{font-family:'Sora',sans-serif;font-size:1.15rem;font-weight:700;color:#111827}
.filters{display:flex;gap:.5rem;flex-wrap:wrap}
.empty{color:#9CA3AF;text-align:center;padding:2rem;font-size:.85rem}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div id="loginBox">
    <h1>Transforma-Ações</h1>
    <p>Sistema de Gestão do Projeto<br/>UNEMAT · CAPES · FAPEMAT</p>
    <input type="password" id="pwdInput" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()"/>

    <div id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
<header>
  <div class="header-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.2rem">

        <span>PROEXT-PG CAPES 03/2024</span>

</header>

<nav>
  <div class="nav-inner" id="navTabs"></div>
</nav>

<main id="mainContent"></main>
</div>

<!-- MODAL -->
<div id="modalOverlay">
  <div id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal()" style="padding:.5rem 1rem;font-size:.85rem">Cancelar</button>
      <button class="btn-primary" style="background:#2563EB;padding:.5rem 1rem;font-size:.85rem" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

const SENHA = "TransformaAcoes2025!";
const SESSION_KEY = "ta_auth";

function doLogin(){
  const v = document.getElementById('pwdInput').value;
  const e = document.getElementById('loginErr');
  if(v === SENHA){
    sessionStorage.setItem(SESSION_KEY, "1");
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    e.textContent = "Senha incorreta. Tente novamente.";
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

const LS = key => {

  return {load, save};
};

let modalCtx = {};

function openModal(cfg){
  modalCtx = cfg;
  el('modalTitle').textContent = (cfg.mode==='add'?'Adicionar':'Editar') + ' — ' + {obj:'Objetivo',gantt:'Atividade no Cronograma',budget:'Item de Orçamento',team:'Membro da Equipe',doc:'Documento'}[cfg.type];
  el('modalBody').innerHTML = buildModalForm(cfg);
  el('modalOverlay').classList.add('open');
}
function closeModal(){ el('modalOverlay').classList.remove('open'); modalCtx={}; }

function buildModalForm(cfg){
  const d = cfg.item || {};
  const inp = (id,val,ph='',type='text') => `<input id="mf_${id}" type="${type}" value="${esc(String(val??''))}" placeholder="${ph}" style="width:100%;border-radius:8px;border:1.5px solid #E5E7EB;padding:.55rem .8rem;font-size:.875rem;font-family:inherit;outline:none;box-sizing:border-box"/>`;
  const sel = (id,opts,val) => `<select id="mf_${id}" style="width:100%;border-radius:8px;border:1.5px solid #E5E7EB;padding:.55rem .8rem;font-size:.875rem;font-family:inherit;outline:none;box-sizing:border-box">${opts.map(o=>`<option value="${o}" ${o==val?'selected':''}>${o}</option>`).join('')}</select>`;
  const ta = (id,val,rows=3) => `<textarea id="mf_${id}" rows="${rows}" style="width:100%;border-radius:8px;border:1.5px solid #E5E7EB;padding:.55rem .8rem;font-size:.875rem;font-family:inherit;outline:none;box-sizing:border-box;resize:vertical">${esc(String(val??''))}</textarea>`;
  const fg = (lbl,html) => `<div class="field-group"><label>${lbl}</label>${html}</div>`;
  const cb = (id,checked,lbl) => `<div class="field-group"><label class="cb-label"><input type="checkbox" id="mf_${id}" ${checked?'checked':''}/>${lbl}</label></div>`;
  const g2 = (a,b) => `<div class="grid-2cols">${a}${b}</div>`;

  if(cfg.type==='obj') return [
    fg('Texto do objetivo', ta('text',d.text,4)),
    fg('Período', inp('periodo',d.periodo,'ex: 09/06/2025–08/06/2026')),
    cfg.section==='fapemat' ? fg('Meses (FAPEMAT)', inp('meses',d.meses,'ex: 1–6')) : '',
    cb('done',d.done,'Marcar como concluído'),
  ].join('');

  if(cfg.type==='gantt') return [
    fg('Atividade / Label', inp('label',d.label)),
    fg('Fonte', sel('source',['CAPES','UNEMAT','FAPEMAT'],d.source)),
    g2(fg('Data de início',inp('startDate',d.startDate,'','date')), fg('Data de fim',inp('endDate',d.endDate,'','date'))),
    cb('done',d.done,'Marcar como concluído'),
  ].join('');

  if(cfg.type==='budget') return [
    fg('Descrição do item', ta('item',d.item,3)),
    g2(fg('Valor Aprovado (R$)',inp('aprovado',d.aprovado,'','number')), fg('Valor Executado (R$)',inp('executado',d.executado,'','number'))),
  ].join('');

  if(cfg.type==='team') return [
    fg('Nome completo', inp('nome',d.nome)),
    fg('Função', inp('funcao',d.funcao)),
    fg('Instituição', inp('instituicao',d.instituicao)),
    g2(fg('Tipo',sel('tipo',['coordenador','posdoc','bolsista_ie','membro','externo'],d.tipo)), fg('Fonte da Bolsa',inp('fonte',d.fonte,'CAPES, FAPEMAT, —'))),
    cb('bolsa',d.bolsa,'Possui bolsa'),
    fg('E-mail', inp('email',d.email,'','email')),
    g2(fg('Início',inp('inicio',d.inicio,'01/02/2025')), fg('Fim',inp('fim',d.fim,'30/11/2027'))),
  ].join('');

  if(cfg.type==='doc') return [
    fg('Nome do documento', inp('nome',d.nome)),
    fg('Tipo', sel('tipo',['CAPES','UNEMAT','FAPEMAT','Bolsista'],d.tipo)),
    fg('Nome do arquivo', inp('arquivo',d.arquivo,'arquivo.pdf')),
    fg('Descrição', ta('descricao',d.descricao,3)),
  ].join('');
}

function getField(id, isCheck=false){ const e=el('mf_'+id); if(!e)return undefined; return isCheck?e.checked:e.value; }

function saveModal(){
  const {type,mode,section,item} = modalCtx;
  const isAdd = mode==='add';
  let data = {...item, id: isAdd ? uid() : item.id};

  if(type==='obj'){
    data.text = getField('text');
    data.periodo = getField('periodo');
    if(section==='fapemat') data.meses = getField('meses');
    data.done = getField('done',true);
    const k = {unemat:'objU',capes:'objC',fapemat:'objF'}[section];
    STATE[k] = isAdd ? [...STATE[k], data] : STATE[k].map(x=>x.id===data.id?data:x);
    save(k);
  } else if(type==='gantt'){
    data.label = getField('label');
    data.source = getField('source');
    data.startDate = getField('startDate');
    data.endDate = getField('endDate');
    data.done = getField('done',true);
    data.color = SRC_COLOR[data.source]||'#7C3AED';
    STATE.gantt = isAdd ? [...STATE.gantt, data] : STATE.gantt.map(x=>x.id===data.id?data:x);
    save('gantt');
  } else if(type==='budget'){
    data.item = getField('item');
    data.aprovado = parseFloat(getField('aprovado'))||0;
    data.executado = parseFloat(getField('executado'))||0;
    const k = section==='capes'?'bCapes':'bFapemat';
    STATE[k] = isAdd ? [...STATE[k], data] : STATE[k].map(x=>x.id===data.id?data:x);
    save(k);
  } else if(type==='team'){
    data.nome = getField('nome');
    data.funcao = getField('funcao');
    data.instituicao = getField('instituicao');
    data.tipo = getField('tipo');
    data.fonte = getField('fonte');
    data.bolsa = getField('bolsa',true);
    data.email = getField('email');
    data.inicio = getField('inicio');
    data.fim = getField('fim');
    STATE.team = isAdd ? [...STATE.team, data] : STATE.team.map(x=>x.id===data.id?data:x);
    save('team');
  } else if(type==='doc'){
    data.nome = getField('nome');
    data.tipo = getField('tipo');
    data.arquivo = getField('arquivo');
    data.descricao = getField('descricao');
    STATE.docs = isAdd ? [...STATE.docs, data] : STATE.docs.map(x=>x.id===data.id?data:x);
    save('docs');
  }

  closeModal();
  render();
}

function badge(bg,c,txt){ return `<span class="badge" style="background:${bg};color:${c}">${txt}</span>`; }
function progBar(pct,color){ return `<div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${color}"></div></div>`; }
function iconEdit(){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`; }
function iconTrash(){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`; }
function iconCheck(){ return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`; }
function iconPlus(){ return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`; }

function iconFile(c){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`; }

function btnRow(id, type, section, item, color='#6B7280'){
  const d = encodeURI(JSON.stringify({type,section,item}));
  return `<button class="btn-sm" onclick='editItem(${item.id},"${type}","${section||''}")'>${iconEdit()}</button>
          <button class="btn-danger" onclick='delItem(${JSON.stringify(item.id)},"${type}","${section||''}")'>${iconTrash()}</button>`;
}

window.editItem = function(rawId, type, section){
  let list;
  if(type==='obj') list = STATE[{unemat:'objU',capes:'objC',fapemat:'objF'}[section]];
  else if(type==='gantt') list = STATE.gantt;
  else if(type==='budget') list = STATE[section==='capes'?'bCapes':'bFapemat'];
  else if(type==='team') list = STATE.team;
  else if(type==='doc') list = STATE.docs;
  const item = list.find(x=>String(x.id)===String(rawId));
  if(item) openModal({type,mode:'edit',section,item:{...item}});
};

window.delItem = function(rawId, type, section){
  if(!confirm('Remover este item?')) return;
  if(type==='obj'){ const k={unemat:'objU',capes:'objC',fapemat:'objF'}[section]; STATE[k]=STATE[k].filter(x=>String(x.id)!==String(rawId)); save(k); }
  else if(type==='gantt'){ STATE.gantt=STATE.gantt.filter(x=>String(x.id)!==String(rawId)); save('gantt'); }
  else if(type==='budget'){ const k=section==='capes'?'bCapes':'bFapemat'; STATE[k]=STATE[k].filter(x=>String(x.id)!==String(rawId)); save(k); }
  else if(type==='team'){ STATE.team=STATE.team.filter(x=>String(x.id)!==String(rawId)); save('team'); }
  else if(type==='doc'){ STATE.docs=STATE.docs.filter(x=>String(x.id)!==String(rawId)); save('docs'); }
  render();
};

window.toggleDone = function(rawId, type, section){
  if(type==='obj'){ const k={unemat:'objU',capes:'objC',fapemat:'objF'}[section]; STATE[k]=STATE[k].map(x=>String(x.id)===String(rawId)?{...x,done:!x.done}:x); save(k); }
  else if(type==='gantt'){ STATE.gantt=STATE.gantt.map(x=>String(x.id)===String(rawId)?{...x,done:!x.done}:x); save('gantt'); }
  render();
};

window.setTab = function(t){ STATE.tab=t; save('tab'); render(); };
window.setTeamFilter = function(f){ STATE.teamFilter=f; save('teamFilter'); render(); };
window.setDocFilter = function(f){ STATE.docFilter=f; save('docFilter'); render(); };

function renderObjSection(title, color, items, section){
  const done = items.filter(x=>x.done).length;
  const pct = items.length ? Math.round(done/items.length*100) : 0;
  return `
  <div class="card" style="margin-bottom:1.25rem;border-left:4px solid ${color}">
    <div class="section-head">
      <div class="section-head-left">
        <div class="section-title">${esc(title)} ${badge(color+'18',color,`${done}/${items.length} concluídos`)}</div>
        <div class="prog-wrap-sm" style="width:180px"><div class="prog-bar" style="width:${pct}%;background:${color}"></div></div>
      </div>
      <button class="btn-primary" style="background:${color}" onclick="openModal({type:'obj',mode:'add',section:'${section}',item:{text:'',done:false,periodo:'',meses:''}})">
        ${iconPlus()} Adicionar
      </button>
    </div>
    <div>
      ${items.map(item=>`
      <div class="obj-row ${item.done?'done':''}">
        <button class="cb" style="border-color:${item.done?color:'#D1D5DB'};background:${item.done?color:'#fff'};margin-top:2px" onclick="toggleDone('${item.id}','obj','${section}')">
          ${item.done?`<span style="color:#fff">${iconCheck()}</span>`:''}
        </button>
        <div style="flex:1;min-width:0">
          <p class="obj-text ${item.done?'done':''}">${esc(item.text)}</p>
          ${item.periodo?`<span class="obj-meta">${esc(item.periodo)}</span>`:''}
          ${item.meses?badge(color+'15',color,'Meses '+item.meses):''}
        </div>
        <div style="display:flex;gap:.3rem;flex-shrink:0">${btnRow(item.id,'obj',section,item)}</div>
      </div>`).join('')}
      ${items.length===0?'<p class="empty">Nenhum objetivo cadastrado.</p>':''}
    </div>
  </div>`;
}

function renderGantt(){
  const today = new Date();
  const todayPct = gL(today.toISOString().split('T')[0]);
  const years = [2024,2025,2026,2027];
  const yearPct = y => gL(`${y}-01-01`);
  const yearW = y => gL(`${y+1}-01-01`) - gL(`${y}-01-01`);

  const gantt = STATE.gantt;
  const labelRows = gantt.map(item=>`
    <div class="gantt-labels"><div class="gl-row">
      <button class="cb" style="width:16px;height:16px;border-radius:4px;border:2px solid ${item.done?item.color:'#D1D5DB'};background:${item.done?item.color:'#fff'}" onclick="toggleDone(${item.id},'gantt','')">
        ${item.done?`<span style="color:#fff;font-size:10px">${iconCheck()}</span>`:''}
      </button>
      <span style="font-size:.72rem;color:${item.done?'#9CA3AF':'#374151'};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(item.label)}">${esc(item.label)}</span>
    </div></div>`).join('');

  const timelineRows = gantt.map(item=>{
    const l = gL(item.startDate);
    const w = gW(item.startDate, item.endDate);
    return `<div class="gantt-row">
      ${years.map(y=>`<div style="position:absolute;left:${yearPct(y)}%;width:${yearW(y)}%;height:100%;border-left:1px solid #F3F4F6"></div>`).join('')}
      ${todayPct>0&&todayPct<100?`<div style="position:absolute;left:${todayPct}%;top:0;bottom:0;width:1px;background:#FCA5A5;z-index:5"></div>`:''}
      <div class="gantt-bar" style="left:${l}%;width:${w}%;background:${item.color};opacity:${item.done?.45:.88}">
        <button class="gantt-bar-btn" onclick="editItem(${item.id},'gantt','')">${iconEdit()}</button>
        <button class="gantt-bar-btn" onclick="delItem(${item.id},'gantt','')">${iconTrash()}</button>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="page-head">
    <div><div class="page-title">Cronograma de Execução</div><p style="color:#6B7280;font-size:.82rem;margin:.25rem 0 0">Março/2024 a Dezembro/2027</p></div>
    <button class="btn-primary" style="background:#7C3AED" onclick="openModal({type:'gantt',mode:'add',section:'',item:{label:'',source:'CAPES',startDate:'',endDate:'',done:false}})">
      ${iconPlus()} Nova Atividade
    </button>
  </div>
  <div class="card-flush">
    <div class="gantt-wrap">
      <div style="width:230px;flex-shrink:0">
        <div class="gl-header"><span style="font-size:.73rem;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em">Atividade</span></div>
        ${gantt.map(item=>`
        <div class="gl-row">
          <button class="cb" style="width:16px;height:16px;border-radius:4px;border:2px solid ${item.done?item.color:'#D1D5DB'};background:${item.done?item.color:'#fff'}" onclick="toggleDone(${item.id},'gantt','')">
            ${item.done?`<span style="color:#fff">${iconCheck()}</span>`:''}
          </button>
          <span style="font-size:.72rem;color:${item.done?'#9CA3AF':'#374151'};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(item.label)}">${esc(item.label)}</span>
        </div>`).join('')}
      </div>
      <div style="flex:1;overflow-x:auto">
        <div class="gantt-inner">
          <div class="year-header">
            ${years.map(y=>`<div class="year-tick" style="left:${yearPct(y)}%;width:${yearW(y)}%">${y}</div>`).join('')}
            ${todayPct>0&&todayPct<100?`<div class="today-line" style="left:${todayPct}%"><div class="today-label">Hoje</div></div>`:''}
          </div>
          ${gantt.map(item=>{
            const l=gL(item.startDate),w=gW(item.startDate,item.endDate);
            return `<div class="gantt-row">
              ${years.map(y=>`<div style="position:absolute;left:${yearPct(y)}%;width:${yearW(y)}%;height:100%;border-left:1px solid #F3F4F6"></div>`).join('')}
              ${todayPct>0&&todayPct<100?`<div style="position:absolute;left:${todayPct}%;top:0;bottom:0;width:1px;background:#FCA5A5;z-index:5"></div>`:''}
              <div class="gantt-bar" style="left:${l}%;width:${w}%;background:${item.color};opacity:${item.done?.45:.88}">
                <button class="gantt-bar-btn" onclick="editItem(${item.id},'gantt','')">${iconEdit()}</button>
                <button class="gantt-bar-btn" onclick="delItem(${item.id},'gantt','')">${iconTrash()}</button>
              </div>
            </div>`;
          }).join('')}
          <div class="gantt-legend">
            ${Object.entries(SRC_COLOR).map(([k,v])=>`<div class="legend-item"><div class="legend-dot" style="background:${v}"></div>${k}</div>`).join('')}
            <div class="legend-item"><div style="width:2px;height:12px;background:#EF4444;border-radius:1px"></div><span style="color:#EF4444">Hoje</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderBudget(){
  const sections = [
    {label:'CAPES',color:'#2563EB',bg:'#EFF6FF',list:STATE.bCapes,key:'bCapes',section:'capes'},
    {label:'FAPEMAT',color:'#DB2777',bg:'#FDF2F8',list:STATE.bFapemat,key:'bFapemat',section:'fapemat'},
  ];
  return `
  <div class="page-head"><div class="page-title">Orçamento do Projeto</div></div>
  <div class="grid-2">
  ${sections.map(b=>{
    const total=b.list.reduce((s,x)=>s+(x.aprovado||0),0);
    const exec=b.list.reduce((s,x)=>s+(x.executado||0),0);
    const pct=total>0?(exec/total*100):0;
    return `<div class="card-flush">
      <div style="padding:1.1rem 1.25rem;border-bottom:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-size:1rem;color:#111827">${b.label}</div>
          <div style="font-size:.78rem;color:#6B7280;margin-top:.15rem">${fBRL(exec)} executado de ${fBRL(total)}</div>
        </div>
        <button class="btn-primary" style="background:${b.color}" onclick="openModal({type:'budget',mode:'add',section:'${b.section}',item:{item:'',aprovado:0,executado:0}})">
          ${iconPlus()} Adicionar
        </button>
      </div>
      <div style="padding:.75rem 1.25rem;background:${b.bg};border-bottom:1px solid #F3F4F6">
        <div style="display:flex;justify-content:space-between;margin-bottom:.4rem">
          <span style="font-size:.75rem;font-weight:600;color:${b.color}">Progresso total</span>
          <span style="font-size:.75rem;font-weight:700;color:${b.color}">${pct.toFixed(1)}%</span>
        </div>
        <div style="height:8px;background:#fff;border-radius:10px;border:1px solid ${b.color}22">
          <div style="height:100%;width:${pct}%;background:${b.color};border-radius:10px"></div>
        </div>
      </div>
      ${b.list.map(item=>{
        const p=item.aprovado>0?Math.min(100,item.executado/item.aprovado*100):0;
        const saldo=item.aprovado-item.executado;
        return `<div class="budget-row">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem">
            <span style="font-size:.83rem;color:#374151;font-weight:500;flex:1">${esc(item.item)}</span>
            <div style="display:flex;gap:.3rem">${btnRow(item.id,'budget',b.section,item)}</div>
          </div>
          <div class="budget-figures">
            <div class="budget-fig"><label>Aprovado</label><div class="val" style="color:${b.color}">${fBRL(item.aprovado)}</div></div>
            <div class="budget-fig"><label>Executado</label><div class="val" style="color:#374151">${fBRL(item.executado)}</div></div>
            <div class="budget-fig"><label>Saldo</label><div class="val" style="color:${saldo>=0?'#059669':'#DC2626'}">${fBRL(saldo)}</div></div>
            <div style="margin-left:auto;display:flex;align-items:center">${badge(p>80?'#FEE2E2':'#F0FDF4',p>80?'#DC2626':'#059669',p.toFixed(0)+'%')}</div>
          </div>
          ${progBar(p,b.color)}
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}
  </div>`;
}

function renderTeam(){
  const filtered = STATE.teamFilter==='todos' ? STATE.team : STATE.teamFilter==='bolsistas' ? STATE.team.filter(x=>x.bolsa) : STATE.team.filter(x=>!x.bolsa);
  return `
  <div class="page-head">
    <div class="page-title">Equipe do Projeto</div>
    <div class="filters">
      ${['todos','bolsistas','membros'].map(f=>`<button class="btn-filter ${STATE.teamFilter===f?'active':''}" onclick="setTeamFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
      <button class="btn-primary" style="background:#7C3AED" onclick="openModal({type:'team',mode:'add',section:'',item:{nome:'',funcao:'',instituicao:'',tipo:'membro',bolsa:false,fonte:'—',email:'—',inicio:'',fim:''}})">
        ${iconPlus()} Adicionar
      </button>
    </div>
  </div>
  <div class="grid-team">
  ${filtered.map(m=>{
    const tc = TIPO_CFG[m.tipo]||TIPO_CFG.membro;
    const ac = tc.ac;
    const initials = m.nome.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(n=>n[0]).join('').slice(0,2).toUpperCase();
    return `<div class="team-card" style="border-top-color:${ac}">
      <div style="display:flex;gap:.75rem;align-items:flex-start">
        <div class="avatar" style="background:${ac}20;color:${ac}">${initials}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.3rem">
            <div style="font-weight:700;font-size:.87rem;color:#111827;line-height:1.3">${esc(m.nome)}</div>
            <div style="display:flex;gap:.25rem;flex-shrink:0">${btnRow(m.id,'team','',m)}</div>
          </div>
          <div style="font-size:.77rem;color:#6B7280;margin-top:.2rem">${esc(m.funcao)}</div>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:.4rem;align-items:center">
        ${badge(tc.bg,tc.c,tc.label)}
        ${m.bolsa?badge('#F5F3FF','#7C3AED','&#9733; Bolsista — '+esc(m.fonte)):''}
        ${badge('#F3F4F6','#6B7280',esc(m.instituicao))}
      </div>
      <div class="team-meta"><span>${esc(m.email)}</span><span>${esc(m.inicio)} → ${esc(m.fim)}</span></div>
    </div>`;
  }).join('')}
  ${filtered.length===0?'<p class="empty" style="grid-column:1/-1">Nenhum membro encontrado.</p>':''}
  </div>`;
}

function renderDocs(){
  const filtered = STATE.docFilter==='todos' ? STATE.docs : STATE.docs.filter(x=>x.tipo===STATE.docFilter);
  return `
  <div class="page-head">
    <div class="page-title">Repositório de Documentos</div>
    <div class="filters">
      ${['todos','CAPES','UNEMAT','FAPEMAT','Bolsista'].map(f=>`<button class="btn-filter btn-filter-blue ${STATE.docFilter===f?'active':''}" onclick="setDocFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
      <button class="btn-primary" style="background:#2563EB" onclick="openModal({type:'doc',mode:'add',section:'',item:{nome:'',tipo:'CAPES',arquivo:'',descricao:''}})">
        ${iconPlus()} Adicionar
      </button>
    </div>
  </div>
  <div class="card-flush">
    <div style="padding:.85rem 1.25rem;background:#F9FAFB;border-bottom:1px solid #F3F4F6;display:flex;gap:.5rem;align-items:center">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span style="font-size:.77rem;color:#6B7280">Os arquivos estão armazenados localmente. O botão mostra o nome do arquivo para acesso manual.</span>
    </div>
    ${filtered.map(doc=>{
      const dc=DOC_CFG[doc.tipo]||{c:'#374151',bg:'#F3F4F6'};
      return `<div class="doc-row">
        <div class="doc-icon" style="background:${dc.bg}">${iconFile(dc.c)}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.4rem">
            <div>
              <span style="font-weight:600;font-size:.85rem;color:#111827">${esc(doc.nome)}</span>
              <div style="margin-top:.2rem">${badge(dc.bg,dc.c,doc.tipo)}</div>
            </div>
            <div style="display:flex;gap:.3rem">
              <button class="btn-sm" style="color:${dc.c}" title="Arquivo: ${esc(doc.arquivo)}">${iconDown()} ${esc(doc.arquivo)}</button>
              ${btnRow(doc.id,'doc','',doc)}
            </div>
          </div>
          <p style="margin:.4rem 0 0;font-size:.78rem;color:#6B7280;line-height:1.5">${esc(doc.descricao)}</p>
        </div>
      </div>`;
    }).join('')}
    ${filtered.length===0?'<p class="empty">Nenhum documento encontrado.</p>':''}
  </div>`;
}

function renderDashboard(){
  const totalObj=[...STATE.objU,...STATE.objC,...STATE.objF].length;
  const doneObj=[...STATE.objU,...STATE.objC,...STATE.objF].filter(x=>x.done).length;
  const totalBC=STATE.bCapes.reduce((s,x)=>s+(x.aprovado||0),0);
  const totalBF=STATE.bFapemat.reduce((s,x)=>s+(x.aprovado||0),0);
  const execBC=STATE.bCapes.reduce((s,x)=>s+(x.executado||0),0);
  const execBF=STATE.bFapemat.reduce((s,x)=>s+(x.executado||0),0);
  const bolsistas=STATE.team.filter(x=>x.bolsa);

  const progCards = [
    {label:'Objetivos UNEMAT',done:STATE.objU.filter(x=>x.done).length,total:STATE.objU.length,color:'#059669',bg:'#ECFDF5'},
    {label:'Objetivos CAPES',done:STATE.objC.filter(x=>x.done).length,total:STATE.objC.length,color:'#2563EB',bg:'#EFF6FF'},
    {label:'Atividades FAPEMAT',done:STATE.objF.filter(x=>x.done).length,total:STATE.objF.length,color:'#DB2777',bg:'#FDF2F8'},
  ];

  return `
  <h2 style="margin:0 0 1.25rem;font-family:'Sora',sans-serif;font-size:1.15rem;font-weight:700;color:#111827">Visão Geral do Projeto</h2>
  <div class="grid-3" style="margin-bottom:1.5rem">
    ${progCards.map(s=>{
      const pct=s.total?Math.round(s.done/s.total*100):0;
      return `<div class="card" style="border-left:4px solid ${s.color}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <span style="font-weight:600;font-size:.85rem;color:#374151">${s.label}</span>
          ${badge(s.bg,s.color,pct+'%')}
        </div>
        <div style="font-size:2rem;font-weight:800;font-family:'Sora',sans-serif;color:${s.color};margin:.5rem 0 .25rem">${s.done}<span style="font-size:1rem;color:#9CA3AF;font-weight:400">/${s.total}</span></div>
        ${progBar(pct,s.color)}
      </div>`;
    }).join('')}
  </div>
  <div class="card" style="margin-bottom:1.5rem">
    <h3 style="margin:0 0 1rem;font-size:.95rem;font-weight:700;color:#111827">Bolsistas em Destaque</h3>
    <div class="grid-3">
      ${bolsistas.map(m=>{
        const tc=TIPO_CFG[m.tipo]||TIPO_CFG.membro;
        const ac=tc.ac;
        const initials=m.nome.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(n=>n[0]).join('').slice(0,2).toUpperCase();
        return `<div style="display:flex;gap:.75rem;align-items:center;padding:.75rem 1rem;background:${ac}08;border-radius:10px;border:1px solid ${ac}22">
          <div class="avatar" style="background:${ac}20;color:${ac};width:40px;height:40px;font-size:.82rem">${initials}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:.82rem;color:#111827">${esc(m.nome.split(' ').slice(0,2).join(' '))}</div>
            <div style="font-size:.72rem;color:#6B7280;margin-top:.1rem">${esc(m.funcao.split('—')[0].trim())}</div>
            ${badge(tc.bg,tc.c,esc(m.fonte))}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>
  <div class="grid-2">
    ${[{label:'CAPES — R$ 239.700',total:totalBC,exec:execBC,color:'#2563EB',list:STATE.bCapes},
       {label:'FAPEMAT — R$ 239.700',total:totalBF,exec:execBF,color:'#DB2777',list:STATE.bFapemat}].map(b=>`
    <div class="card">
      <div style="font-weight:700;font-size:.88rem;color:#111827;margin-bottom:.75rem">${b.label}</div>
      ${b.list.map(i=>`
      <div style="margin-bottom:.5rem">
        <div style="display:flex;justify-content:space-between;font-size:.73rem;color:#6B7280;margin-bottom:.2rem">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(i.item.split('(')[0].trim())}</span>
          <span style="flex-shrink:0;margin-left:.5rem">${fBRL(i.aprovado)}</span>
        </div>
        <div class="prog-wrap-xs"><div class="prog-bar" style="width:${i.aprovado>0?Math.min(100,i.executado/i.aprovado*100):0}%;background:${b.color}"></div></div>
      </div>`).join('')}
    </div>`).join('')}
  </div>`;
}

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render(){
  const TABS=[
    {id:'dashboard',label:'Dashboard'},
    {id:'objetivos',label:'Objetivos'},
    {id:'gantt',label:'Cronograma'},
    {id:'orcamento',label:'Orçamento'},
    {id:'equipe',label:'Equipe'},
    {id:'documentos',label:'Documentos'},
  ];

  el('navTabs').innerHTML = TABS.map(t=>`<button class="tab-btn ${STATE.tab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');

  const totalObj=[...STATE.objU,...STATE.objC,...STATE.objF].length;
  const doneObj=[...STATE.objU,...STATE.objC,...STATE.objF].filter(x=>x.done).length;
  const totalBC=STATE.bCapes.reduce((s,x)=>s+(x.aprovado||0),0);
  const totalBF=STATE.bFapemat.reduce((s,x)=>s+(x.aprovado||0),0);
  const execBC=STATE.bCapes.reduce((s,x)=>s+(x.executado||0),0);
  const execBF=STATE.bFapemat.reduce((s,x)=>s+(x.executado||0),0);

  el('headerStats').innerHTML=[
    {label:'Total CAPES',val:fBRL(totalBC),sub:'Executado: '+fBRL(execBC)},
    {label:'Total FAPEMAT',val:fBRL(totalBF),sub:'Executado: '+fBRL(execBF)},
    {label:'Objetivos',val:`${doneObj}/${totalObj}`,sub:Math.round((doneObj/(totalObj||1))*100)+'% concluídos'},
    {label:'Equipe',val:STATE.team.length,sub:STATE.team.filter(x=>x.bolsa).length+' bolsistas'},
  ].map(s=>`<div class="stat-card"><div class="slabel">${s.label}</div><div class="sval">${s.val}</div><div class="ssub">${s.sub}</div></div>`).join('');

  const content = {
    dashboard: renderDashboard,
    objetivos: () => `
      <h2 style="margin:0 0 1.25rem;font-family:'Sora',sans-serif;font-size:1.15rem;font-weight:700;color:#111827">Objetivos do Projeto</h2>
      ${renderObjSection('UNEMAT — 2ª Edição (PJ241-2025)','#059669',STATE.objU,'unemat')}
      ${renderObjSection('CAPES — PROEXT-PG Edital 03/2024','#2563EB',STATE.objC,'capes')}
      ${renderObjSection('FAPEMAT — Atividades A-1 a A-8','#DB2777',STATE.objF,'fapemat')}`,
    gantt: renderGantt,
    orcamento: renderBudget,
    equipe: renderTeam,
    documentos: renderDocs,
  };

  el('mainContent').innerHTML = (content[STATE.tab]||content.dashboard)();
}

/* ============================================================
   INIT
   ============================================================ */
function initApp(){
  loadState();
  render();
}

if(sessionStorage.getItem(SESSION_KEY)==='1') initApp();
</script>
